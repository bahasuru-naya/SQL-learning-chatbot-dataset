recipe: default.v1
assistant_id: crud_bot
language: en

pipeline:
- name: RegexEntityExtractor
  use_lookup_tables: True
  use_regexes: True
  entity_regexes:
    - name: quantity
      pattern: ^(?:[0-9]|[1-9][0-9]{1,5}|1000000)$
    - name: id
      pattern: ^[1-9][0-9]*$
    - name: price
      pattern: ^\d+(\.\d{1,2})?$
    - name: sales
      pattern: ^(?:[0-9]|[1-9][0-9]{1,5}|1000000)$
    - name: date
      pattern: ^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])$
    - name: sale_id
      pattern: ^[1-9][0-9]*$
    - name: condition
      pattern: ^(>=|<=|>|<|=)\s*\d+(\.\d{1,2})?$
  epochs: 200
- name: WhitespaceTokenizer
- name: CountVectorsFeaturizer
- name: DIETClassifier
  entity_recognition: True
  epochs: 200
  random_seed: 42
  constrain_similarities: True
- name: FallbackClassifier
  threshold: 0.5


policies:
- name: MemoizationPolicy
- name: TEDPolicy
  max_history: 5
  epochs: 200
  random_seed: 42
  constrain_similarities: True
- name: RulePolicy
  core_fallback_threshold: 0.3
  core_fallback_action_name: "action_default_fallback"
  enable_fallback_prediction: True






